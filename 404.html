<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Count</title>
  <meta property="og:site_name" content="Simple Count">
  <meta property="og:title" content="Simple Count — Countdown Event">
  <meta property="og:description" content="Tap to import this countdown event into Simple Count.">
  <meta property="og:image" content="https://simplecountdownapp.github.io/icon.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Simple Count — Countdown Event">
  <meta name="twitter:description" content="Tap to import this countdown event into Simple Count.">
  <meta name="twitter:image" content="https://simplecountdownapp.github.io/icon.png">
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f2f2f7; }
    .card { text-align: center; padding: 40px 32px; background: white;
            border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 340px; }
    img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; color: #1c1c1e; }
    p  { font-size: 15px; color: #6e6e73; margin: 0 0 24px; line-height: 1.5; }
    a  { display: inline-block; background: #007aff; color: white; padding: 14px 28px;
         border-radius: 14px; text-decoration: none; font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon.png" alt="Simple Count">
    <h1>Simple Count</h1>
    <p id="pitch">Open Simple Count on your iPhone to import this event.</p>
    <a id="cta" href="https://apps.apple.com/app/id6761277550">Get Simple Count</a>
  </div>
  <script>
    var T = {
      de: { p: "Öffne Simple Count auf deinem iPhone, um dieses Ereignis zu importieren.", a: "Simple Count laden" },
      nl: { p: "Open Simple Count op je iPhone om dit evenement te importeren.", a: "Download Simple Count" },
      fr: { p: "Ouvrez Simple Count sur votre iPhone pour importer cet événement.", a: "Télécharger Simple Count" },
      es: { p: "Abre Simple Count en tu iPhone para importar este evento.", a: "Descargar Simple Count" },
      it: { p: "Apri Simple Count sul tuo iPhone per importare questo evento.", a: "Scarica Simple Count" },
      pt: { p: "Abra o Simple Count no seu iPhone para importar este evento.", a: "Baixar o Simple Count" },
      ru: { p: "Откройте Simple Count на iPhone, чтобы импортировать это событие.", a: "Скачать Simple Count" },
      tr: { p: "Bu etkinliği içe aktarmak için iPhone'unda Simple Count'u aç.", a: "Simple Count'u İndir" },
      ja: { p: "このイベントを追加するには、iPhone で Simple Count を開いてください。", a: "Simple Count を入手" },
      ko: { p: "이 이벤트를 가져오려면 iPhone에서 Simple Count를 여세요.", a: "Simple Count 받기" },
      zh: { p: "请在 iPhone 上打开 Simple Count 以导入此事件。", a: "获取 Simple Count" }
    };
    var lang = (navigator.language || "en").toLowerCase().split("-")[0];
    if (T[lang]) {
      document.documentElement.lang = lang;
      document.getElementById("pitch").textContent = T[lang].p;
      document.getElementById("cta").textContent = T[lang].a;
    }

    var match = window.location.pathname.match(/^\/e\/([^/]+)$/);
    if (match) {
      var recordId = match[1];
      window.location = 'simplecount://import-cloud?id=' + encodeURIComponent(recordId);
    }
  </script>
</body>
</html>
